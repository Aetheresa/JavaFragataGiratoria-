<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Editar Producto</h2>

    <form th:action="@{/productos/actualizar}" method="post">

        <input type="hidden" name="idProducto" th:value="${producto.idProducto}">

        <div class="mb-3">
            <label class="form-label">Nombre del Producto</label>
            <input type="text" name="nombreProducto" th:value="${producto.nombreProducto}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Unidad de Medida</label>
            <input type="text" name="unidadMedida" th:value="${producto.unidadMedida}" class="form-control">
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Stock Actual</label>
                <input type="number" step="0.01" name="stockActual"
                       th:value="${producto.stockActual}" class="form-control">
            </div>

            <div class="col-6 mb-3">
                <label class="form-label">Stock Mínimo</label>
                <input type="number" step="0.01" name="stockMinimo"
                       th:value="${producto.stockMinimo}" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Proveedor</label>
            <select name="proveedor.idProveedor" class="form-select">
                <option th:each="prov : ${proveedores}"
                        th:value="${prov.idProveedor}"
                        th:text="${prov.nombreProveedor}"
                        th:selected="${prov.idProveedor == producto.proveedor.idProveedor}">
                </option>
            </select>
        </div>

        <button class="btn btn-primary">Actualizar</button>
        <a href="/productos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

</body>
</html>

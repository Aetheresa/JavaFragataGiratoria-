<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/editusuarios.css}">
    <title>Editar Usuario</title>
</head>
<body>

<div class="dashboard-box">
    <h2 class="form-title">✏️ Editar Usuario</h2>

    <form th:action="@{'/usuarios/actualizar/' + ${usuario.idUsuario}}" method="POST" th:object="${usuario}" class="form-usuario">

        <div class="form-group">
            <label>Nombre Usuario</label>
            <input type="text" th:field="*{nombreUsuario}" class="input-field">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="input-field">
        </div>

        <div class="form-group">
            <label>Contraseña (solo si deseas cambiarla)</label>
            <input type="password" th:field="*{passwordHash}" class="input-field">
        </div>

        <div class="form-group">
            <label>Rol</label>
            <select th:field="*{rol}" class="input-field">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r.nombreRol}"></option>
            </select>
        </div>

        <div class="form-actions">
            <a href="/usuarios" class="btn-cancelar">⬅️ Volver</a>
            <button type="submit" class="btn-guardar">💾 Guardar cambios</button>
        </div>
    </form>
</div>

</body>
</html>

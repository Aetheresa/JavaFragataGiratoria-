<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/createusuario.css}">
    <title>Crear Usuario</title>
</head>
<body>

<div class="dashboard-box">
    <h2 class="form-title">➕ Crear Usuario</h2>

    <form th:action="@{/usuarios}" method="POST" class="form-usuarios" th:object="${usuario}">
        
        <div class="form-group">
            <label>Nombre usuario</label>
            <input type="text" th:field="*{nombreUsuario}" class="input-field">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="input-field">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" th:field="*{passwordHash}" class="input-field">
        </div>

        <div class="form-group">
            <label>Rol</label>
            <select th:field="*{rol}" class="input-field">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r.nombreRol}"></option>
            </select>
        </div>

        <div class="form-actions">
            <a href="/usuarios" class="btn-cancelar">⬅️ Volver</a>
            <button type="submit" class="btn-guardar">✅ Guardar</button>
        </div>
    </form>
</div>

</body>
</html>

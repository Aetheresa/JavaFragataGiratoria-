<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar Producto - La Fragata Giratoria</title>
    <link rel="stylesheet" href="/css/productoedit.css" />
</head>

<body>
<div class="layout-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">La Fragata Giratoria</div>

        <input class="search-input" type="search" placeholder="🔍 Búsqueda" />

        <nav class="menu">
            <a href="/roles/admin/dashboard" class="nav-button">Inicio</a>
            <a href="/productos" class="nav-button active">Productos</a>
            <a href="/crud/platillos" class="nav-button">Platillos</a>
            <a href="/crud/compras" class="nav-button">Compras</a>
            <a href="/crud/pedidos" class="nav-button">Pedidos</a>
            <a href="/crud/usuarios" class="nav-button">Usuarios</a>
            <a href="/crud/metodosdepago" class="nav-button">Métodos de Pago</a>
        </nav>

        <!-- BOTONES INFERIORES -->
        <div class="bottom-buttons">
            <a href="/admin/ajustes" class="nav-button"> Ajustes</a>
            <a href="/roles/admin/ayuda" class="nav-button"> Ayuda</a>
            <a href="/logout" class="nav-button"> Salir</a>
        </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <div class="dashboard-wrapper">

            <!-- TITULO -->
            <div class="header-title">
                <h1>🛠️ Editar Producto</h1>
                <p>Actualiza la información de un producto existente.</p>
            </div>

            <!-- FORMULARIO EDITAR PRODUCTO -->
            <div class="form-container">
                <form th:object="${producto}"
                      th:action="@{/productos/actualizar/{id}(id=${producto.id})}"
                      method="post" enctype="multipart/form-data">

                    <!-- Nombre -->
                    <div class="form-group">
                        <label for="nombre">Nombre del Producto</label>
                        <input type="text" id="nombre" name="nombre" th:field="*{nombre}" required>
                    </div>

                    <!-- Descripción -->
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion" th:field="*{descripcion}" required></textarea>
                    </div>

                    <!-- Categoría -->
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" name="categoria" th:field="*{categoria}" required>
                            <option value="Entradas">Entradas 🥂</option>
                            <option value="Platos Principales">Platos Principales 🍴</option>
                            <option value="Mariscos">Mariscos 🦑</option>
                            <option value="Bebidas">Bebidas 🍹</option>
                            <option value="Postres">Postres 🍰</option>
                            <option value="Especialidades">Especialidades de la Casa 🌟</option>
                            <option value="Extra">Extra ⚓️</option>
                        </select>
                    </div>

                    <!-- Precio -->
                    <div class="form-group">
                        <label for="precio">Precio</label>
                        <input type="number" id="precio" name="precio" th:field="*{precio}" required>
                    </div>

                    <!-- Stock -->
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" name="stock" th:field="*{stock}" required>
                    </div>

                    <!-- Stock Mínimo -->
                    <div class="form-group">
                        <label for="stockMinimo">Stock Mínimo</label>
                        <input type="number" id="stockMinimo" name="stockMinimo" th:field="*{stockMinimo}" required>
                    </div>

                    <!-- Botones -->
                    <div class="button-group">
                        <button type="submit" class="btn-submit">Actualizar Producto</button>
                        <a href="/productos" class="btn-cancel">Cancelar</a>
                    </div>

                </form>
            </div>

            <a href="/admin/dashboard" class="back-to-dashboard">← Volver al Dashboard</a>

        </div>

    </main>

</div>

<script src="/js/productocrud.js"></script>
</body>
</html>

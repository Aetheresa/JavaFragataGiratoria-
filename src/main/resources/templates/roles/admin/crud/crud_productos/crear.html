<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crear Producto - La Fragata Giratoria</title>
    <link rel="stylesheet" href="/css/crear_producto.css" />
</head>

<body>
<div class="layout-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">

            <div class="logo">
                La Fragata Giratoria
            </div>

            <input class="search-input" type="search" id="search-input" placeholder="🔍 Búsqueda" />

            <nav class="menu">
                <a href="/roles/admin/dashboard" class="nav-button">Inicio</a>
                <a href="/crud/productos" class="nav-button">Productos</a>
                <a href="/crud/platillos" class="nav-button">Platillos</a>
                <a href="/crud/compras" class="nav-button">Compras</a>
                <a href="/crud/pedidos" class="nav-button">Pedidos</a>
                <a href="/crud/usuarios" class="nav-button">Usuarios</a>
                <a href="/crud/metodosdepago" class="nav-button">Métodos de Pago</a>
            </nav>
        </div>

        <div class="bottom-buttons">
            <a href="/admin/ajustes" class="nav-button">Ajustes</a>
            <a href="/roles/admin/ayuda" class="nav-button">Ayuda</a>
            <a href="/logout" class="nav-button">Salir</a>
        </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <div class="dashboard-wrapper">

            <!-- TITULO -->
            <div class="header-title">
                <h1>🛠️ Crear Producto</h1>
                <p>Agrega un nuevo producto al sistema.</p>
            </div>

            <!-- FORMULARIO CREAR PRODUCTO -->
            <div class="form-container">
                <form th:action="@{/productos/guardar}" method="post" enctype="multipart/form-data">

                    <!-- Nombre del producto -->
                    <div class="form-group">
                        <label for="nombre">Nombre del Producto</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre del producto" required>
                    </div>

                    <!-- Descripción del producto -->
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto" required></textarea>
                    </div>

                    <!-- Categoría -->
                    <div class="form-group">
                        <label for="categoria">Categoría ⚓️</label>
                        <select id="categoria" name="categoria" required>
                            <option value="Categoría 1">Entradas 🥂</option>
                            <option value="Categoría 2">Platos Principales 🍴</option>
                            <option value="Categoría 3">Mariscos 🦑</option>
                            <option value="Categoría 3">Bebidas 🍹</option>
                            <option value="Categoría 3">Postres 🍰</option>
                            <option value="Categoría 3">Especialidades de la Casa 🌟</option>
                            <option value="Categoría 3">Extra ⚓️</option>
                        </select>
                    </div>

                    <!-- Precio -->
                    <div class="form-group">
                        <label for="precio">Precio</label>
                        <input type="number" id="precio" name="precio" placeholder="Precio del producto" required>
                    </div>

                    <!-- Stock -->
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" name="stock" placeholder="Cantidad en stock" required>
                    </div>

                    <!-- Stock Mínimo -->
                    <div class="form-group">
                        <label for="stockMinimo">Stock Mínimo</label>
                        <input type="number" id="stockMinimo" name="stockMinimo" placeholder="Stock mínimo" required>
                    </div>

                    <div class="form-group">
                        <label for="stockMinimo">Stock Actual</label>
                        <input type="number" id="stockMinimo" name="stockActual" placeholder="Stock Actual" required>
                    </div>

                    <!-- Botones -->
                    <div class="button-group">
                        <button type="submit" class="btn-submit">Guardar Producto</button>
                        <a href="/productos" class="btn-cancel">Cancelar</a>
                    </div>

                </form>
            </div>

            <a href="/admin/dashboard" class="back-to-dashboard">← Volver al Dashboard</a>

        </div>

    </main>

</div>

<script src="/js/productocrud.js"></script>
</body>
</html>
